name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip files for all ORM stacks
        run: |
          cd myrmex-oci-orm        && zip -r ../myrmex-oci-orm.zip * --exclude "*.DS_Store"              && cd ..
          cd oci-integration-key   && zip -r ../myrmex-oci-integration-key.zip * --exclude "*.DS_Store"  && cd ..
          cd oci-integration-vm    && zip -r ../myrmex-oci-integration-vm.zip * --exclude "*.DS_Store"   && cd ..

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: "Automated release"
          draft: false
          prerelease: false
          token: ${{ secrets.GH_ORGANIZATION_ACCESS_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myrmex-oci-orm.zip#myrmex-oci-orm.zip
            myrmex-oci-integration-key.zip#myrmex-oci-integration-key.zip
            myrmex-oci-integration-vm.zip#myrmex-oci-integration-vm.zip
          token: ${{ secrets.GH_ORGANIZATION_ACCESS_TOKEN }}